<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <title>Buscador CEP</title>
  </head>
  <body>
    <nav class="menu">
      <ul>
        <li>
          <a
            href="https://www.linkedin.com/in/gustavo-savi"
            target="_blank"
            rel="nofollow"
            >Linkedin →</a
          >
        </li>
        <li>
          <a href="https://github.com/gutosavi" target="_blank" rel="nofollow"
            >GitHub →</a
          >
        </li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
    <section class="container-busca">
      <form action="" id="formulario">
        <h1>Busca CEP</h1>
        <div class="input-box">
          <label for="logradouro">Logradouro</label>
          <input
            type="text"
            name="logradouro"
            id="input-logradouro"
            placeholder="Digite o logradouro"
            autofocus
          />
        </div>
        <div class="input-box">
          <label for="bairro">Bairro</label>
          <input
            type="text"
            name="bairro"
            id="input-bairro"
            placeholder="Digite o bairro"
          />
        </div>
        <div class="input-box">
          <label for="cidade">Cidade</label>
          <input
            type="text"
            name="cidade"
            id="input-cidade"
            placeholder="Digite a cidade"
          />
        </div>
        <div class="input-box">
          <label for="uf">UF</label>
          <select name="uf" id="input-uf">
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="ES">Espirito Santo</option>
            <option value="GO">Goiás</option>
            <option value="DF">Distrito Federal</option>
            <option value="MA">Maranhão</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernanbuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>
        </div>
        <button type="submit" class="btn">Buscar</button>
        <div class="msg-erro"></div>
      </form>
    </section>
    <footer class="copy">
      <p>Todos os direitos reservados.</p>
    </footer>
    <script type="module" src="assets/js/script.js"></script>
  </body>
</html>
